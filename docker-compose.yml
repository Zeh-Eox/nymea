services:
  postgres:
    image: postgres:16-alpine
    container_name: nymea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nymea
    ports:
      - '5432:5432'
    volumes:
      - nymea-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nymea']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nymea-pg-data:
